<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Gestión Automotriz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container my-5">
    <h1 class="text-center mb-4 fw-bold text-dark">Panel de Control - Consultas</h1>
    
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <button class="btn btn-primary w-100 py-2 fw-semibold" onclick="obtenerConductores()">Ver Conductores</button>
      </div>
      <div class="col-md-3">
        <button class="btn btn-success w-100 py-2 fw-semibold" onclick="obtenerAutomoviles()">Ver Automóviles</button>
      </div>
      <div class="col-md-3">
        <button class="btn btn-warning w-100 py-2 fw-semibold text-white" onclick="obtenerSolitos()">Ver "Solitos"</button>
      </div>
    </div>

    <div class="row g-3 mb-4 p-3 bg-white rounded shadow-sm border">
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Conductores sin auto (Menores de X años):</label>
        <div class="input-group">
          <input type="number" id="edadInput" class="form-control" placeholder="Ej: 30">
          <button class="btn btn-outline-primary" onclick="buscarSinAuto()">Buscar</button>
        </div>
      </div>
      
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Buscar Auto por Patente:</label>
        <div class="input-group">
          <input type="text" id="patenteInput" class="form-control" placeholder="Ej: HXJH55">
          <button class="btn btn-outline-success" onclick="buscarPorPatente()">Buscar</button>
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Buscar por Letra Inicial de Patente:</label>
        <div class="input-group">
          <input type="text" id="inicioInput" class="form-control" placeholder="Ej: H" maxlength="2">
          <button class="btn btn-outline-warning" onclick="buscarPorInicioPatente()">Buscar</button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white py-3">
        <h5 class="mb-0 fw-bold" id="resultadoTitulo">Resultados de la Consulta</h5>
      </div>
      <div class="card-body" id="resultadoContenido">
        <p class="text-muted text-center my-4">Presiona algún botón superior o realiza una búsqueda para visualizar los registros.</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';

    function renderTabla(datos, columnas) {
      if (!datos || datos.length === 0) {
        return '<div class="alert alert-info m-0 text-center">No se encontraron registros para esta consulta.</div>';
      }
      
      let html = `<div class="table-responsive"><table class="table table-striped table-hover align-middle m-0"><thead><tr>`;
      columnas.forEach(col => html += `<th class="bg-light">${col.toUpperCase().replace('_', ' ')}</th>`);
      html += `</tr></thead><tbody>`;
      
      datos.forEach(fila => {
        html += `<tr>`;
        columnas.forEach(col => {
          let valor = fila[col];
          html += `<td>${valor !== null && valor !== undefined ? valor : '<span class="text-muted italic">Ninguno</span>'}</td>`;
        });
        html += `</tr>`;
      });
      
      html += `</tbody></table></div>`;
      return html;
    }

    async function obtenerConductores() {
      document.getElementById('resultadoTitulo').innerText = "Lista General de Conductores";
      try {
        const res = await fetch(`${API_URL}/conductores`);
        const data = await res.json();
        document.getElementById('resultadoContenido').innerHTML = renderTabla(data, ['nombre', 'edad']);
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }

    async function obtenerAutomoviles() {
      document.getElementById('resultadoTitulo').innerText = "Lista General de Automóviles";
      try {
        const res = await fetch(`${API_URL}/automoviles`);
        const data = await res.json();
        document.getElementById('resultadoContenido').innerHTML = renderTabla(data, ['marca', 'patente', 'nombre_conductor']);
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }

    async function buscarSinAuto() {
      const edad = document.getElementById('edadInput').value;
      if(!edad) return alert('Ingresa una edad válida.');
      
      document.getElementById('resultadoTitulo').innerText = `Conductores sin auto menores de ${edad} años`;
      try {
        const res = await fetch(`${API_URL}/conductoressinauto?edad=${edad}`);
        const data = await res.json();
        document.getElementById('resultadoContenido').innerHTML = renderTabla(data, ['nombre', 'edad']);
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }

    async function obtenerSolitos() {
      document.getElementById('resultadoTitulo').innerText = "Registros 'Solitos' (Sin emparejamiento mutuo)";
      try {
        const res = await fetch(`${API_URL}/solitos`);
        const data = await res.json();

        let html = `<h6 class="fw-bold text-primary mb-2">Conductores sin automóvil:</h6>`;
        html += renderTabla(data.conductores_sin_auto, ['nombre', 'edad']);
        html += `<h6 class="mt-4 fw-bold text-danger mb-2">Automóviles sin conductor (No registrado):</h6>`;
        html += renderTabla(data.automoviles_sin_conductor, ['marca', 'patente', 'nombre_conductor']);
        
        document.getElementById('resultadoContenido').innerHTML = html;
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }

    async function buscarPorPatente() {
      const patente = document.getElementById('patenteInput').value;
      if(!patente) return alert('Ingresa una patente.');

      document.getElementById('resultadoTitulo').innerText = `Resultado para Patente: ${patente}`;
      try {
        const res = await fetch(`${API_URL}/auto?patente=${patente}`);
        const data = await res.json();
        document.getElementById('resultadoContenido').innerHTML = renderTabla(data, ['marca', 'patente', 'nombre_conductor', 'conductor_edad']);
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }

    async function buscarPorInicioPatente() {
      const letra = document.getElementById('inicioInput').value;
      if(!letra) return alert('Ingresa una letra inicial.');

      document.getElementById('resultadoTitulo').innerText = `Automóviles que empiezan con: "${letra}"`;
      try {
        const res = await fetch(`${API_URL}/auto?iniciopatente=${letra}`);
        const data = await res.json();
        document.getElementById('resultadoContenido').innerHTML = renderTabla(data, ['marca', 'patente', 'nombre_conductor', 'conductor_edad']);
      } catch (err) {
        document.getElementById('resultadoContenido').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
